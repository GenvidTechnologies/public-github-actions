name: Node Gate

on:
  workflow_call:
    inputs:
      dry-run:
        description: "Run npm publish --dry-run (non-failing)"
        type: boolean
        default: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - if: inputs.dry-run
        run: npm publish --dry-run --access public
        continue-on-error: true
